<configuration>
    <input>
        <net-file value="src/net.net.xml"/>
        <!-- <route-files value="MUST BE BASSED FROM COMMAND LINE AS ARGUMENT"/>-->
        <additional-files value="detectors.add.xml,src/cs.add.xml"/>
    </input>
    <time>
        <begin value="0"/>
        <end value="86400"/>
        <step-length value="0.25"/>
    </time>
    <output>
        <!-- https://sumo.dlr.de/docs/Models/Electric.html -->
        <battery-output value="battery.out.xml"/>
        <battery-output.precision value="4"/>
        <!-- <device.battery.probability value="1"/>-->
        <!-- <chargingstations-output value="chargingevents.xml"/>-->
        <!-- <chargingstations-output.aggregated value="true"/>-->
        <chargingstations-output value="chargingstations.xml"/>
        <summary-output value="summary.out.xml"/>
        <tripinfo-output value="tripinfo.out.xml"/>
        <tripinfo-output.write-unfinished value="true"/>
        <statistic-output value="statistic.out.xml"/>
    </output>
    <gui_only>
        <start value="true"/>
        <gui-settings-file value="src/gui.xml"/>
    </gui_only>
</configuration>